name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - run: python -m pip install -e ".[web]" build pip-audit pytest pyyaml ruff twine
      - name: Verify release tag matches package version
        run: test "$GITHUB_REF_NAME" = "v$(python -c 'from doi2pdf import __version__; print(__version__)')"
      - run: ruff check doi2pdf tests
      - run: python -m pytest -q
      - run: python -m pip_audit .
      - run: python -m build
      - run: python -m twine check dist/*
      - name: Package agent skill with its CLI wheel
        run: |
          mkdir -p build/skill/doi2pdf/assets
          cp -r skills/doi2pdf/. build/skill/doi2pdf/
          cp dist/doi2pdf-*.whl build/skill/doi2pdf/assets/
          cd build/skill && zip -r ../../dist/doi2pdf-skill.zip doi2pdf
      - name: Package one-click source product
        run: git archive --format=zip --output=dist/DOI2PDF-windows-source.zip HEAD
      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "$GITHUB_REF_NAME" dist/* --verify-tag --generate-notes --title "DOI2PDF $GITHUB_REF_NAME"
